<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mkhoyan Narek</title>

<style>

/* Օնլայն հղումով կապում ենք քո Singing Sans տառատեսակը */
@font-face {
    font-family: 'Singing Sans';
    src: url('https://files-baseddb-saulx-esc2026-production-en-e-e-ko51x0.based.dev/Singing_Sans-4dddf2f65a75d3ded1f8b293f387faa8.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body,html{
    width:100%;
    height:100%;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family: 'Singing Sans', Arial, sans-serif;
    color:white;

    background:
    radial-gradient(circle at center,
    #2b3a55 0%,
    #000 100%);
}

.video-bg{
    position:fixed;
    inset:0;
    z-index:0;
}

.video-bg video{
    width:100%;
    height:100%;
    object-fit:cover;

    filter:
    blur(10px)
    brightness(0.6);

    transform:scale(1.1);
}

.liquid-glass{

    position:relative;
    z-index:2;

    width:90%;
    max-width:480px;

    padding:55px 35px;

    text-align:center;

    background:
    rgba(255,255,255,0.08);

    backdrop-filter:
    blur(25px)
    saturate(160%);

    border:
    1px solid rgba(255,255,255,0.15);

    border-radius:
    60% 40% 30% 70% /
    60% 30% 70% 40%;

    box-shadow:
    0 20px 45px rgba(0,0,0,0.5);

    animation:
    float 6s ease-in-out infinite;
}

@keyframes float{

    0%,100%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-18px);
    }
}

h1{
    font-size:2.5rem;
    margin-bottom:15px;
}

.status{
    color:#00d4ff;
    line-height:1.5;
    margin-bottom:25px;
}

.tags{

    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:12px;

    margin-bottom:30px;
}

.tag{

    padding:8px 16px;

    border-radius:20px;

    font-size:0.85rem;

    background:
    rgba(255,255,255,0.08);

    border:
    1px solid rgba(255,255,255,0.15);
}

.music-controls{

    display:flex;
    justify-content:center;
    gap:20px;
}

.music-btn{

    width:70px;
    height:70px;

    border:none;
    border-radius:50%;

    cursor:pointer;

    font-size:30px;
    color:white;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    rgba(255,255,255,0.1);

    border:
    2px solid rgba(255,255,255,0.2);

    backdrop-filter:blur(20px);

    transition:0.3s;
}

.music-btn:hover{

    transform:
    scale(1.1)
    translateY(-5px);

    border-color:#00d4ff;

    box-shadow:
    0 0 30px rgba(0,212,255,0.5);
}

.music-btn.playing{

    animation:pulse 2s infinite;
}

@keyframes pulse{

    0%,100%{
        box-shadow:
        0 0 20px rgba(0,212,255,0.2);
    }

    50%{
        box-shadow:
        0 0 40px rgba(0,212,255,0.6);
    }
}

@media(max-width:480px){

    .liquid-glass{
        padding:40px 25px;
        border-radius:15px !important;
    }

    h1{
        font-size:2rem;
    }

    .music-btn{
        width:60px;
        height:60px;
        font-size:24px;
    }
}

</style>
</head>
<body>

<div class="video-bg">

    <video autoplay muted loop playsinline id="bgVideo">

        <source
        src="https://video.wixstatic.com/video/11062b_62f0356712544a87b392417662c4658d/720p/mp4/file.mp4"
        type="video/mp4">

    </video>

</div>

<main class="liquid-glass">

    <h1>Mkhoyan Narek</h1>

    <p class="status">
        The website is still under development,<br>
        hold on tight, everything's gonna be awesome!
    </p>

    <div class="tags">

        <span class="tag">Developer</span>

        <span class="tag">BANGARANGA</span>

    </div>

    <div class="music-controls">

        <button
        class="music-btn"
        id="musicStart">

            ▶

        </button>

        <button
        class="music-btn"
        id="musicStop">

            ⏹

        </button>

    </div>

</main>

<audio id="myAudio" loop>
    <source src="eurovision.mp3" type="audio/mpeg">
</audio>

<script>

window.addEventListener('DOMContentLoaded', () => {

    const video = document.getElementById('bgVideo');
    video.play().catch(() => {});

    const audio = document.getElementById('myAudio');
    const startBtn = document.getElementById('musicStart');
    const stopBtn = document.getElementById('musicStop');

    // START MUSIC
    function startMusic(){
        audio.play().catch(() => {});
        startBtn.classList.add('playing');
    }

    // STOP MUSIC
    function stopMusic(){
        audio.pause();
        startBtn.classList.remove('playing');
    }

    startBtn.addEventListener('click', startMusic);
    stopBtn.addEventListener('click', stopMusic);

    // ՀՆԱՐՔ: Հենց օգտատերը առաջին անգամ սեղմի էկրանի ցանկացած տեղ, երգը ավտոմատ կմիանա
    document.addEventListener('click', () => {
        audio.play().then(() => {
            startBtn.classList.add('playing');
        }).catch(error => {
            console.log("Autoplay blocked by browser policy until user interaction.");
        });
    }, { once: true });

});

</script>

</body>
</html>
