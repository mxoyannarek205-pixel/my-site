<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Загрузка...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f172a 0%, #1a1f3a 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .splash-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 30px;
            animation: fadeOut 0.8s ease-in-out 3.5s forwards;
        }

        .pulse-circle {
            width: 100px;
            height: 100px;
            background-color: #38bdf8;
            border-radius: 50%;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.8);
                box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.7);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 30px rgba(56, 189, 248, 0);
            }
            100% {
                transform: scale(0.8);
                box-shadow: 0 0 0 0 rgba(56, 189, 248, 0);
            }
        }

        .loading-text {
            color: #38bdf8;
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 2px;
            animation: blink 1s infinite ease-in-out;
        }

        @keyframes blink {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        @keyframes fadeOut {
            0% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                visibility: hidden;
            }
        }

        .dots {
            display: inline-block;
            animation: dots 1.4s infinite;
        }

        @keyframes dots {
            0%, 20% {
                content: '.';
            }
            40% {
                content: '..';
            }
            60%, 100% {
                content: '...';
            }
        }
    </style>
</head>
<body>
    <div class="splash-screen">
        <div class="pulse-circle"></div>
        <div class="loading-text">Загрузка<span class="dots">.</span></div>
    </div>

    <script>
        // Переход на основной сайт после анимации (3.5 секунд)
        setTimeout(() => {
            window.location.href = 'index.html'; // Замени на путь твоего основного сайта
        }, 3500);

        // Альтернативный вариант с проверкой наличия основного файла:
        // setTimeout(() => {
        //     window.location.href = './'; // Редирект на корневую папку
        // }, 3500);
    </script>
</body>
</html>
